<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#100c0d" />
    <meta name="description" content="LYH" />
    <title> LYH </title>
    <link rel="preload" as="image" href="./pic.jpg" />
    <style>
      :root {
        color-scheme: dark;
        --ink: #100c0d;
        --paper: #fff9ec;
        --red: #ff355d;
        --butter: #ffd365;
        --ice: #cce9df;
        --mx: 0;
        --my: 0;
        --px: 50%;
        --py: 50%;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        min-height: 100%;
        margin: 0;
        background: var(--ink);
      }

      html {
        scroll-behavior: smooth;
        scrollbar-color: var(--red) var(--ink);
      }

      body {
        overflow-x: hidden;
        font-family: "Arial Narrow", "PingFang SC", "Microsoft YaHei", sans-serif;
        cursor: crosshair;
        overscroll-behavior-y: none;
        -webkit-text-size-adjust: 100%;
      }

      button {
        font: inherit;
        touch-action: manipulation;
        appearance: none;
        border-radius: 0;
        -webkit-tap-highlight-color: transparent;
        -webkit-appearance: none;
      }

      section,
      main {
        scroll-margin-top: 0;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      .scene {
        position: relative;
        min-height: 100svh;
        isolation: isolate;
        overflow: hidden;
        background: #120e0f;
      }

      .ambient,
      .portrait,
      .color-wash,
      .vignette,
      .noise,
      .spotlight,
      .grid {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .ambient {
        z-index: -9;
        inset: -8%;
        background: url("./pic.jpg") center 42% / cover no-repeat;
        filter: blur(35px) saturate(1.18) brightness(0.42);
        transform: scale(1.14);
        animation: ambient-drift 18s ease-in-out infinite alternate;
      }

      .portrait-wrap {
        position: absolute;
        z-index: -7;
        top: 0;
        left: 50%;
        width: min(72vw, 69vh);
        height: 100%;
        transform: translateX(-50%);
        filter: drop-shadow(0 0 45px rgba(0, 0, 0, 0.42));
        animation: portrait-enter 1.8s cubic-bezier(0.16, 1, 0.3, 1) both;
      }

      .portrait {
        background: url("./pic.jpg") center / cover no-repeat;
        filter: saturate(0.86) contrast(1.08) brightness(0.82);
        transform: scale(1.035);
        animation:
          camera-breathe 13s ease-in-out 1.8s infinite alternate,
          focus-in 1.4s ease-out both;
        -webkit-mask-image: linear-gradient(90deg, transparent, #000 7%, #000 93%, transparent);
        mask-image: linear-gradient(90deg, transparent, #000 7%, #000 93%, transparent);
      }

      .color-wash {
        z-index: -5;
        background:
          radial-gradient(circle at 20% 24%, rgba(255, 53, 93, 0.32), transparent 31%),
          radial-gradient(circle at 82% 70%, rgba(255, 211, 101, 0.2), transparent 32%),
          linear-gradient(110deg, rgba(12, 9, 10, 0.58), transparent 44%, rgba(12, 9, 10, 0.38));
        mix-blend-mode: screen;
        animation: color-pulse 9s ease-in-out infinite alternate;
      }

      .vignette {
        z-index: -3;
        background:
          linear-gradient(180deg, rgba(8, 5, 7, 0.62), transparent 18%, transparent 72%, rgba(8, 5, 7, 0.82)),
          radial-gradient(ellipse at center, transparent 28%, rgba(8, 5, 6, 0.19) 62%, rgba(8, 5, 6, 0.7) 120%);
        box-shadow: inset 0 0 12vw rgba(0, 0, 0, 0.42);
      }

      .grid {
        z-index: 0;
        opacity: 0.11;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.24) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.24) 1px, transparent 1px);
        background-size: 9vw 9vw;
        -webkit-mask-image: linear-gradient(90deg, #000, transparent 35%, transparent 65%, #000);
        mask-image: linear-gradient(90deg, #000, transparent 35%, transparent 65%, #000);
      }

      .spotlight {
        z-index: 14;
        opacity: 0.5;
        background: radial-gradient(circle 180px at var(--px) var(--py), rgba(255, 247, 220, 0.15), transparent 72%);
        mix-blend-mode: screen;
        transition: opacity 0.4s ease;
      }

      .noise {
        z-index: 20;
        opacity: 0.12;
        mix-blend-mode: soft-light;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 160 160' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.88' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.55'/%3E%3C/svg%3E");
        animation: grain 0.22s steps(2) infinite;
      }

      .chrome {
        position: absolute;
        inset: max(18px, 2vw);
        z-index: 12;
        pointer-events: none;
        border: 1px solid rgba(255, 249, 236, 0.33);
      }

      .chrome::before,
      .chrome::after {
        position: absolute;
        width: 7px;
        height: 7px;
        content: "";
        background: var(--red);
        box-shadow:
          calc(100vw - max(36px, 4vw) - 9px) 0 0 var(--butter),
          0 calc(100vh - max(36px, 4vw) - 9px) 0 var(--ice);
      }

      .axis-name {
        position: absolute;
        z-index: 3;
        left: 50%;
        bottom: clamp(58px, 8vh, 110px);
        width: max-content;
        color: transparent;
        font-size: clamp(5.4rem, 16vw, 14rem);
        font-weight: 950;
        line-height: 0.68;
        letter-spacing: -0.13em;
        -webkit-text-stroke: clamp(1px, 0.12vw, 2px) rgba(255, 249, 236, 0.87);
        text-shadow: 0 0 35px rgba(255, 255, 255, 0.08);
        transform: translateX(-51%);
        white-space: nowrap;
        mix-blend-mode: screen;
        animation: title-enter 1.6s 0.85s cubic-bezier(0.16, 1, 0.3, 1) both;
      }

      .axis-name::after {
        position: absolute;
        inset: 0;
        content: attr(data-text);
        color: rgba(255, 53, 93, 0.1);
        -webkit-text-stroke: 0;
        transform: translate(8px, 5px);
        filter: blur(0.4px);
      }

      .latin-left,
      .latin-right {
        position: absolute;
        z-index: 4;
        top: 50%;
        color: var(--paper);
        font-size: clamp(2.8rem, 7.6vw, 8rem);
        font-weight: 900;
        line-height: 0.78;
        letter-spacing: -0.08em;
        mix-blend-mode: difference;
        white-space: nowrap;
      }

      .latin-left {
        left: 1.2vw;
        transform: translate(-35%, -50%) rotate(-90deg);
        animation: left-in 1.5s 1.1s cubic-bezier(0.16, 1, 0.3, 1) both;
      }

      .latin-right {
        right: 1.2vw;
        transform: translate(35%, -50%) rotate(90deg);
        animation: right-in 1.5s 1.2s cubic-bezier(0.16, 1, 0.3, 1) both;
      }

      .orbit {
        position: absolute;
        z-index: 5;
        top: 46%;
        left: 50%;
        width: min(72vw, 72vh);
        aspect-ratio: 1;
        border: 1px solid rgba(255, 249, 236, 0.22);
        border-radius: 50%;
        transform: translate(-50%, -50%) rotate(-12deg);
        animation: orbit-turn 24s linear infinite;
        pointer-events: none;
      }

      .orbit::before,
      .orbit::after {
        position: absolute;
        content: "";
        border-radius: inherit;
      }

      .orbit::before {
        inset: 8%;
        border: 1px dashed rgba(255, 211, 101, 0.35);
      }

      .orbit::after {
        top: -5px;
        left: 47%;
        width: 10px;
        height: 10px;
        background: var(--red);
        box-shadow: 0 0 18px var(--red);
      }

      .scatter {
        position: absolute;
        inset: 0;
        z-index: 7;
        transform: perspective(800px) rotateX(calc(var(--my) * -0.18deg)) rotateY(calc(var(--mx) * 0.22deg));
        transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        pointer-events: none;
      }

      .token {
        --x: 50%;
        --y: 50%;
        --r: 0deg;
        --s: 1rem;
        --o: 0.8;
        --dx: 8px;
        --dy: -10px;
        --d: 9s;
        --delay: 0s;
        position: absolute;
        top: var(--y);
        left: var(--x);
        color: var(--paper);
        font-size: var(--s);
        font-weight: 800;
        line-height: 0.84;
        letter-spacing: -0.05em;
        opacity: var(--o);
        text-shadow: 0 2px 8px rgba(0, 0, 0, 0.38);
        white-space: nowrap;
        transform: translate(-50%, -50%) rotate(var(--r));
        animation:
          token-in 1.1s var(--delay) cubic-bezier(0.16, 1, 0.3, 1) both,
          token-float var(--d) calc(var(--delay) + 1.1s) ease-in-out infinite alternate;
        will-change: transform;
      }

      .token[data-tone="red"] {
        color: var(--red);
      }

      .token[data-tone="butter"] {
        color: var(--butter);
        font-family: Georgia, "Songti SC", serif;
        font-style: italic;
      }

      .token[data-tone="ice"] {
        color: var(--ice);
        font-family: "Courier New", monospace;
        letter-spacing: 0.07em;
      }

      .token[data-outline="true"] {
        color: transparent;
        -webkit-text-stroke: 1px rgba(255, 249, 236, 0.78);
        text-shadow: none;
      }

      .token[data-depth="back"] {
        z-index: -1;
        filter: blur(1.3px);
        mix-blend-mode: screen;
      }

      .ticker {
        position: absolute;
        z-index: 10;
        left: -5vw;
        width: 110vw;
        overflow: hidden;
        border-block: 1px solid rgba(255, 249, 236, 0.35);
        color: var(--ink);
        background: var(--paper);
        box-shadow: 0 7px 26px rgba(0, 0, 0, 0.24);
        pointer-events: none;
      }

      .ticker--one {
        top: 16%;
        transform: rotate(-3.2deg);
        animation: ticker-enter-left 1.4s 0.35s cubic-bezier(0.16, 1, 0.3, 1) both;
      }

      .ticker--two {
        bottom: 15%;
        color: var(--paper);
        background: var(--red);
        transform: rotate(2.7deg);
        animation: ticker-enter-right 1.4s 0.55s cubic-bezier(0.16, 1, 0.3, 1) both;
      }

      .ticker__track {
        display: flex;
        width: max-content;
        padding: 6px 0 5px;
        font-size: clamp(0.7rem, 1.15vw, 1rem);
        font-weight: 900;
        line-height: 1;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        animation: marquee 22s linear infinite;
      }

      .ticker--two .ticker__track {
        animation-direction: reverse;
        animation-duration: 17s;
      }

      .ticker__track span {
        padding-right: 2.2em;
      }

      .ticker__track span::after {
        padding-left: 2.2em;
        content: "✦";
      }

      .caption {
        position: absolute;
        z-index: 13;
        bottom: max(31px, 3.2vw);
        left: max(30px, 3.4vw);
        display: flex;
        align-items: center;
        gap: 12px;
        color: rgba(255, 249, 236, 0.74);
        font: 600 9px/1 "Courier New", monospace;
        letter-spacing: 0.17em;
        text-transform: uppercase;
        animation: rise-in 1s 1.75s both;
      }

      .caption::before {
        width: 38px;
        height: 1px;
        content: "";
        background: var(--red);
      }

      .scroll-cue {
        position: absolute;
        z-index: 15;
        bottom: max(25px, 2.6vw);
        left: 50%;
        display: grid;
        place-items: center;
        gap: 7px;
        color: rgba(255, 249, 236, 0.72);
        font: 700 8px/1 "Courier New", monospace;
        letter-spacing: 0.2em;
        text-decoration: none;
        text-transform: uppercase;
        transform: translateX(-50%);
        animation: rise-in 1s 2s both;
      }

      .scroll-cue::after {
        width: 1px;
        height: 28px;
        content: "";
        background: linear-gradient(var(--red), transparent);
        animation: scroll-pulse 1.6s ease-in-out infinite;
      }

      .page-nav {
        position: fixed;
        z-index: 29;
        top: 50%;
        right: max(12px, 1.2vw);
        display: grid;
        gap: 9px;
        transform: translateY(-50%);
      }

      .page-nav a {
        width: 7px;
        height: 7px;
        border: 1px solid rgba(255, 249, 236, 0.72);
        border-radius: 50%;
        background: rgba(16, 12, 13, 0.38);
        transition: 0.3s ease;
      }

      .page-nav a:hover,
      .page-nav a:focus-visible {
        border-color: var(--red);
        background: var(--red);
        outline: none;
        transform: scale(1.45);
      }

      .page-progress {
        position: fixed;
        z-index: 90;
        top: 0;
        left: 0;
        width: 100%;
        height: 2px;
        overflow: hidden;
        background: rgba(255, 249, 236, 0.1);
        pointer-events: none;
      }

      .page-progress span {
        display: block;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, var(--red), var(--butter) 54%, var(--ice));
        box-shadow: 0 0 12px rgba(255, 53, 93, 0.72);
        transform: scaleX(0);
        transform-origin: left center;
        will-change: transform;
      }

      .burst {
        --bx: 50vw;
        --by: 50vh;
        --tx: 0px;
        --ty: -80px;
        position: fixed;
        z-index: 40;
        top: var(--by);
        left: var(--bx);
        color: var(--burst-color, var(--paper));
        font-size: var(--burst-size, 1.2rem);
        font-weight: 950;
        line-height: 1;
        pointer-events: none;
        transform: translate(-50%, -50%);
        animation: burst-away 0.95s cubic-bezier(0.16, 0.8, 0.35, 1) forwards;
      }

      .chapter-two {
        --chapter-progress: 0;
        --ambient-scale: 1.12;
        --card-y: 3.5vh;
        --card-rotate: -3deg;
        --card-scale: 0.9;
        --image-scale: 1.08;
        --word-one-x: 30vw;
        --word-two-x: -24vw;
        --orbit-rotation: 0deg;
        position: relative;
        min-height: 165svh;
        isolation: isolate;
        color: var(--paper);
        background: #071513;
      }

      .chapter-two::after {
        position: absolute;
        z-index: 12;
        right: 0;
        bottom: 0;
        left: 0;
        height: 18svh;
        content: "";
        background: linear-gradient(transparent, rgba(18, 10, 13, 0.98));
        pointer-events: none;
      }

      .photo2-stage {
        position: sticky;
        top: 0;
        height: 100svh;
        overflow: hidden;
      }

      .photo2-ambient,
      .photo2-wash,
      .photo2-grain {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .photo2-ambient {
        inset: -8%;
        z-index: -4;
        background: url("./pic2.jpg") center / cover no-repeat;
        filter: blur(42px) saturate(1.25) brightness(0.33);
        transform: scale(var(--ambient-scale));
      }

      .photo2-wash {
        z-index: -2;
        background:
          radial-gradient(circle at 72% 28%, rgba(117, 235, 211, 0.25), transparent 31%),
          radial-gradient(circle at 21% 79%, rgba(255, 53, 93, 0.24), transparent 35%),
          linear-gradient(180deg, rgba(7, 21, 19, 0.78), transparent 31%, rgba(7, 21, 19, 0.64));
        mix-blend-mode: screen;
      }

      .photo2-card {
        position: absolute;
        top: 50%;
        left: 50%;
        width: min(64vw, 61vh);
        height: min(84vh, 900px);
        margin: 0;
        overflow: hidden;
        border: 1px solid rgba(204, 233, 223, 0.6);
        background: #12211e;
        box-shadow:
          0 34px 80px rgba(0, 0, 0, 0.52),
          0 0 0 12px rgba(204, 233, 223, 0.035);
        transform:
          translate(-50%, calc(-50% + var(--card-y)))
          rotate(var(--card-rotate))
          scale(var(--card-scale));
        transition: box-shadow 0.3s ease;
        will-change: transform;
      }

      .photo2-card::before {
        position: absolute;
        z-index: 2;
        inset: 0;
        content: "";
        background:
          linear-gradient(115deg, rgba(255, 255, 255, 0.13), transparent 25%),
          linear-gradient(180deg, transparent 57%, rgba(3, 10, 9, 0.56));
        mix-blend-mode: screen;
      }

      .photo2-card img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center;
        filter: saturate(0.91) contrast(1.07) brightness(0.88);
        transform: scale(var(--image-scale));
      }

      .chapter-index {
        position: absolute;
        z-index: 4;
        top: max(28px, 3vw);
        left: max(28px, 4vw);
        display: flex;
        align-items: center;
        gap: 13px;
        color: var(--ice);
        font: 700 9px/1 "Courier New", monospace;
        letter-spacing: 0.22em;
        text-transform: uppercase;
      }

      .chapter-index::before {
        width: 34px;
        height: 1px;
        content: "";
        background: var(--ice);
      }

      .chapter-two__word {
        position: absolute;
        z-index: 3;
        color: var(--paper);
        font-weight: 950;
        line-height: 0.76;
        letter-spacing: -0.09em;
        text-transform: uppercase;
        pointer-events: none;
        mix-blend-mode: difference;
        will-change: transform;
      }

      .chapter-two__word--one {
        top: 11%;
        right: -2vw;
        color: var(--ice);
        font-size: clamp(4rem, 12vw, 12rem);
        text-shadow:
          5px 5px 0 rgba(255, 53, 93, 0.42),
          0 0 32px rgba(204, 233, 223, 0.18);
        transform: translateX(var(--word-one-x));
        mix-blend-mode: screen;
      }

      .chapter-two__word--two {
        bottom: 8%;
        left: -1vw;
        color: transparent;
        font-size: clamp(4rem, 14vw, 13rem);
        -webkit-text-stroke: 1.5px rgba(255, 211, 101, 0.88);
        text-shadow: 7px 7px 0 rgba(255, 53, 93, 0.34);
        transform: translateX(var(--word-two-x));
        mix-blend-mode: screen;
      }

      .chapter-two__han {
        position: absolute;
        z-index: 5;
        top: 50%;
        left: max(30px, 4.5vw);
        color: var(--butter);
        font: italic 700 clamp(2.2rem, 6.5vw, 6.5rem)/0.9 Georgia, "Songti SC", serif;
        letter-spacing: -0.08em;
        writing-mode: vertical-rl;
        transform: translateY(-50%);
        text-shadow: 0 0 28px rgba(255, 211, 101, 0.18);
      }

      .orbit-two {
        position: absolute;
        z-index: 1;
        top: 50%;
        left: 50%;
        width: min(89vw, 89vh);
        aspect-ratio: 1;
        border: 1px dashed rgba(204, 233, 223, 0.22);
        border-radius: 50%;
        transform: translate(-50%, -50%) rotate(var(--orbit-rotation));
      }

      .orbit-two::before {
        position: absolute;
        top: 13%;
        left: 6%;
        width: 13px;
        height: 13px;
        border-radius: 50%;
        content: "";
        background: var(--ice);
        box-shadow: 0 0 24px var(--ice);
      }

      .photo2-grain {
        z-index: 8;
        opacity: 0.12;
        mix-blend-mode: soft-light;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 120 120' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence baseFrequency='.8' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)' opacity='.5'/%3E%3C/svg%3E");
      }

      .chapter-three {
        --three-progress: 0;
        --p3-scale: 0.9;
        --p3-rotate: 3deg;
        --p3-y: 3vh;
        --p3-image-scale: 1.06;
        --p3-left-x: -26vw;
        --p3-right-x: 24vw;
        --p3-halo-rotate: -18deg;
        position: relative;
        min-height: 165svh;
        isolation: isolate;
        color: var(--paper);
        background: #120a0d;
      }

      .chapter-three::after {
        position: absolute;
        z-index: 12;
        right: 0;
        bottom: 0;
        left: 0;
        height: 18svh;
        content: "";
        background: linear-gradient(transparent, rgba(10, 8, 10, 0.99));
        pointer-events: none;
      }

      .photo3-stage {
        position: sticky;
        top: 0;
        height: 100svh;
        overflow: hidden;
      }

      .photo3-stage::before,
      .photo3-stage::after {
        position: absolute;
        z-index: 6;
        width: 52px;
        height: 3px;
        content: "";
        background: var(--red);
        box-shadow: 0 9px 0 rgba(255, 249, 236, 0.64);
        pointer-events: none;
      }

      .photo3-stage::before {
        top: 7%;
        left: 4%;
      }

      .photo3-stage::after {
        right: 4%;
        bottom: 7%;
        transform: rotate(180deg);
      }

      .photo3-ambient,
      .photo3-wash,
      .photo3-grain {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .photo3-ambient {
        inset: -8%;
        z-index: -5;
        background: url("./pic3.jpg") center 38% / cover no-repeat;
        filter: blur(43px) saturate(0.78) brightness(0.31);
        transform: scale(1.15);
        animation: photo3-ambient-drift 17s ease-in-out infinite alternate;
        will-change: transform, filter;
      }

      .photo3-wash {
        z-index: -3;
        background:
          radial-gradient(circle at 17% 24%, rgba(255, 53, 93, 0.29), transparent 30%),
          radial-gradient(circle at 84% 74%, rgba(255, 211, 101, 0.16), transparent 33%),
          linear-gradient(135deg, rgba(18, 10, 13, 0.92), rgba(18, 10, 13, 0.48) 48%, rgba(3, 9, 9, 0.88));
        animation: photo3-wash-breathe 11s ease-in-out infinite alternate;
      }

      .photo3-wash::before {
        --p3-grid-size: 7.5vw;
        position: absolute;
        inset: 0;
        content: "";
        opacity: 0.1;
        background-image:
          linear-gradient(rgba(255, 249, 236, 0.25) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 249, 236, 0.25) 1px, transparent 1px);
        background-size: var(--p3-grid-size) var(--p3-grid-size);
        -webkit-mask-image: radial-gradient(circle at center, transparent 22%, #000 105%);
        mask-image: radial-gradient(circle at center, transparent 22%, #000 105%);
        animation: photo3-grid-drift 22s linear infinite;
      }

      .photo3-wash::after {
        position: absolute;
        top: 7%;
        left: 8%;
        width: 42vw;
        max-width: 620px;
        aspect-ratio: 1;
        border-radius: 50%;
        content: "";
        opacity: 0.54;
        background: radial-gradient(circle, rgba(255, 53, 93, 0.31), rgba(123, 28, 38, 0.08) 48%, transparent 72%);
        filter: blur(44px);
        animation: photo3-orb-float 13s ease-in-out infinite alternate;
        will-change: transform;
      }

      .photo3-card {
        position: absolute;
        z-index: 3;
        top: 50%;
        left: 50%;
        width: min(62vw, 62vh);
        height: auto;
        aspect-ratio: 988 / 1600;
        margin: 0;
        overflow: hidden;
        border: 1px solid rgba(255, 249, 236, 0.62);
        background: #dcd8cc;
        box-shadow:
          18px 18px 0 rgba(123, 28, 38, 0.88),
          36px 36px 0 rgba(5, 4, 5, 0.96),
          0 38px 90px rgba(0, 0, 0, 0.62);
        transform:
          translate(-50%, calc(-50% + var(--p3-y)))
          rotate(var(--p3-rotate))
          scale(var(--p3-scale));
        will-change: transform;
      }

      .photo3-card::before {
        position: absolute;
        z-index: 2;
        inset: 0;
        content: "";
        background:
          linear-gradient(112deg, rgba(255, 255, 255, 0.19), transparent 24%),
          linear-gradient(180deg, transparent 62%, rgba(32, 18, 19, 0.22));
        mix-blend-mode: screen;
        pointer-events: none;
      }

      .photo3-card::after {
        position: absolute;
        z-index: 3;
        inset: 9px;
        border: 1px solid rgba(255, 249, 236, 0.46);
        content: "";
        box-shadow: inset 0 0 0 1px rgba(23, 18, 18, 0.08);
        pointer-events: none;
      }

      .photo3-card img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center;
        filter: saturate(0.88) contrast(1.06) brightness(0.95);
        transform: scale(var(--p3-image-scale));
        will-change: transform;
      }

      .cat-halo {
        position: absolute;
        z-index: 1;
        top: 47%;
        left: 50%;
        width: min(83vw, 83vh);
        height: min(56vw, 56vh);
        border: 1px solid rgba(255, 53, 93, 0.58);
        border-radius: 50%;
        transform: translate(-50%, -50%) rotate(var(--p3-halo-rotate));
        box-shadow:
          inset 0 0 0 9px rgba(255, 53, 93, 0.035),
          0 0 0 1px rgba(255, 249, 236, 0.26),
          0 0 42px rgba(255, 53, 93, 0.12);
        will-change: transform;
      }

      .cat-halo::before,
      .cat-halo::after {
        position: absolute;
        top: 50%;
        width: 24%;
        height: 1px;
        content: "";
        background: var(--red);
        box-shadow:
          0 -12px 0 rgba(255, 53, 93, 0.45),
          0 12px 0 rgba(255, 53, 93, 0.45);
      }

      .cat-halo::before {
        right: 96%;
        transform: rotate(8deg);
        transform-origin: right;
      }

      .cat-halo::after {
        left: 96%;
        transform: rotate(-8deg);
        transform-origin: left;
      }

      .chapter-three__word {
        position: absolute;
        z-index: 5;
        color: var(--paper);
        font-size: clamp(5rem, 14vw, 13rem);
        font-weight: 950;
        line-height: 0.76;
        letter-spacing: -0.13em;
        pointer-events: none;
        white-space: nowrap;
        will-change: transform;
      }

      .chapter-three__word--left {
        top: 12%;
        left: 3vw;
        color: var(--paper);
        text-shadow:
          5px 5px 0 rgba(255, 53, 93, 0.84),
          0 0 28px rgba(255, 249, 236, 0.14);
        transform: translateX(var(--p3-left-x)) rotate(-4deg);
      }

      .chapter-three__word--right {
        right: 3vw;
        bottom: 10%;
        color: transparent;
        -webkit-text-stroke: 1.5px rgba(255, 211, 101, 0.88);
        text-shadow: 7px 7px 0 rgba(255, 53, 93, 0.42);
        transform: translateX(var(--p3-right-x)) rotate(3deg);
      }

      .chapter-three__lyh {
        position: absolute;
        z-index: 0;
        top: 50%;
        left: 50%;
        color: transparent;
        font-size: clamp(9rem, 31vw, 28rem);
        font-weight: 950;
        line-height: 0.7;
        letter-spacing: -0.1em;
        -webkit-text-stroke: 1px rgba(255, 249, 236, 0.1);
        transform: translate(-50%, -50%) rotate(-90deg);
        white-space: nowrap;
      }

      .photo3-grain {
        z-index: 8;
        opacity: 0.09;
        mix-blend-mode: soft-light;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 130 130' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='p'%3E%3CfeTurbulence baseFrequency='.72' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23p)' opacity='.38'/%3E%3C/svg%3E");
      }

      .verdict {
        position: relative;
        min-height: 100svh;
        isolation: isolate;
        display: grid;
        place-items: center;
        overflow: hidden;
        padding: clamp(72px, 10vw, 140px) 22px;
        color: var(--paper);
        background:
          radial-gradient(circle at 15% 15%, rgba(255, 53, 93, 0.22), transparent 25%),
          radial-gradient(circle at 85% 80%, rgba(204, 233, 223, 0.12), transparent 28%),
          linear-gradient(145deg, #120b0e, #080708 68%, #101a18);
      }

      .verdict::before {
        position: absolute;
        inset: 0;
        z-index: -1;
        content: "";
        opacity: 0.12;
        background-image:
          linear-gradient(rgba(255, 249, 236, 0.34) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 249, 236, 0.34) 1px, transparent 1px);
        background-size: 48px 48px;
        -webkit-mask-image: radial-gradient(circle, transparent 16%, #000 100%);
        mask-image: radial-gradient(circle, transparent 16%, #000 100%);
      }

      .verdict-marquee {
        position: absolute;
        top: 7%;
        left: 50%;
        width: max-content;
        color: rgba(255, 249, 236, 0.055);
        font-size: clamp(5rem, 14vw, 13rem);
        font-weight: 950;
        line-height: 0.7;
        letter-spacing: -0.08em;
        transform: translateX(-50%) rotate(-4deg);
        white-space: nowrap;
      }

      .verdict-stamp {
        position: absolute;
        right: max(28px, 3vw);
        bottom: max(24px, 2.8vw);
        display: flex;
        align-items: center;
        gap: 11px;
        color: rgba(255, 249, 236, 0.62);
        font: 800 9px/1 "Courier New", monospace;
        letter-spacing: 0.18em;
      }

      .verdict-stamp::before {
        width: 32px;
        height: 1px;
        content: "";
        background: var(--red);
      }

      .question-card {
        position: relative;
        width: min(780px, 92vw);
        padding: clamp(35px, 6vw, 76px);
        border: 2px solid rgba(255, 249, 236, 0.72);
        color: var(--paper);
        background:
          linear-gradient(145deg, rgba(255, 249, 236, 0.09), rgba(255, 249, 236, 0.025)),
          rgba(12, 9, 10, 0.72);
        box-shadow:
          14px 14px 0 var(--red),
          29px 29px 0 rgba(255, 249, 236, 0.82),
          0 34px 80px rgba(0, 0, 0, 0.48);
        backdrop-filter: blur(16px);
        transform: rotate(-1.2deg);
        -webkit-backdrop-filter: blur(16px);
      }

      .question-card::before {
        position: absolute;
        top: -15px;
        left: 8%;
        padding: 7px 14px;
        content: "最后一题";
        color: var(--paper);
        background: var(--red);
        font: 700 9px/1 "Courier New", monospace;
        letter-spacing: 0.18em;
      }

      .question-card::after {
        position: absolute;
        top: 18%;
        right: -0.22em;
        content: "✦";
        color: var(--butter);
        font-size: clamp(4rem, 10vw, 8rem);
        line-height: 1;
        text-shadow: 5px 5px 0 var(--red);
        transform: rotate(11deg);
        pointer-events: none;
      }

      .question-card__eyebrow {
        margin: 0 0 18px;
        color: var(--red);
        font: 800 10px/1 "Courier New", monospace;
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }

      .question-card h2 {
        max-width: 650px;
        margin: 0;
        font-size: clamp(3rem, 9vw, 7.6rem);
        font-weight: 950;
        line-height: 0.84;
        letter-spacing: -0.09em;
      }

      .question-card h2 em {
        color: var(--red);
        font-family: Georgia, "Songti SC", serif;
        font-weight: 700;
      }

      .choices {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
        margin-top: clamp(34px, 5vw, 58px);
      }

      .choice {
        position: relative;
        min-height: 76px;
        padding: 16px 18px;
        border: 2px solid rgba(255, 249, 236, 0.72);
        color: var(--paper);
        background: rgba(255, 249, 236, 0.025);
        font-size: clamp(0.95rem, 2.2vw, 1.35rem);
        font-weight: 900;
        line-height: 1.25;
        cursor: pointer;
        transition:
          transform 0.2s cubic-bezier(0.16, 1, 0.3, 1),
          box-shadow 0.2s ease,
          color 0.2s ease,
          background 0.2s ease;
      }

      .choice span {
        display: inline-block;
        margin-left: 7px;
        font-size: 1.7em;
        vertical-align: middle;
        transition: transform 0.25s ease;
      }

      .choice:hover,
      .choice:focus-visible {
        color: var(--ink);
        background: var(--paper);
        box-shadow: 7px 7px 0 var(--red);
        outline: none;
        transform: translate(-4px, -4px) rotate(-1deg);
      }

      .choice:last-child:hover,
      .choice:last-child:focus-visible {
        color: var(--ink);
        background: var(--ice);
        box-shadow: 7px 7px 0 var(--paper);
        transform: translate(-4px, -4px) rotate(1deg);
      }

      .choice:hover span {
        transform: scale(1.22) rotate(8deg);
      }

      .verdict.is-angry .question-card {
        animation: card-shake 0.42s linear both;
      }

      .verdict.is-cute .question-card {
        animation: card-squish 0.55s cubic-bezier(0.16, 1.3, 0.3, 1) both;
      }

      .reaction-dialog {
        width: min(520px, calc(100vw - 34px));
        padding: 0;
        overflow: visible;
        border: 0;
        color: var(--paper);
        background: transparent;
      }

      .reaction-dialog::backdrop {
        background: rgba(8, 5, 6, 0.75);
        backdrop-filter: blur(12px) saturate(0.7);
        -webkit-backdrop-filter: blur(12px) saturate(0.7);
      }

      .reaction-dialog[open] {
        animation: dialog-pop 0.45s cubic-bezier(0.16, 1.2, 0.3, 1) both;
      }

      .reaction-dialog.fallback-open {
        position: fixed;
        z-index: 200;
        inset: 0;
        display: block;
        margin: auto;
      }

      .reaction-dialog.fallback-open::before {
        position: fixed;
        z-index: -1;
        inset: 0;
        content: "";
        background: rgba(8, 5, 6, 0.8);
      }

      .reaction-box {
        position: relative;
        display: grid;
        place-items: center;
        min-height: 390px;
        padding: 42px 28px 34px;
        border: 2px solid var(--paper);
        background: var(--red);
        box-shadow:
          12px 12px 0 var(--paper),
          24px 24px 0 var(--ink);
        text-align: center;
        transform: rotate(-1.5deg);
      }

      .reaction-dialog.is-cute .reaction-box {
        color: var(--ink);
        background: var(--ice);
        transform: rotate(1.5deg);
      }

      .reaction-emoji {
        display: block;
        font-size: clamp(7rem, 24vw, 11rem);
        line-height: 1;
        filter: drop-shadow(0 12px 0 rgba(16, 12, 13, 0.16));
        animation: emoji-rage 0.55s ease-in-out infinite alternate;
      }

      .reaction-dialog.is-cute .reaction-emoji {
        animation-name: emoji-sick;
      }

      .reaction-message {
        margin: 20px 0 24px;
        font-size: clamp(2.6rem, 9vw, 5rem);
        font-weight: 950;
        line-height: 0.9;
        letter-spacing: -0.08em;
      }

      .dialog-close {
        padding: 11px 24px;
        border: 2px solid currentColor;
        color: inherit;
        background: transparent;
        font-size: 0.82rem;
        font-weight: 900;
        cursor: pointer;
        transition: 0.2s ease;
      }

      .dialog-close:hover,
      .dialog-close:focus-visible {
        color: var(--ink);
        background: var(--paper);
        outline: none;
        transform: rotate(-2deg) scale(1.06);
      }

      .reaction-dialog.is-cute .dialog-close:hover,
      .reaction-dialog.is-cute .dialog-close:focus-visible {
        color: var(--paper);
        background: var(--ink);
      }

      .reaction-particle {
        --rx: 0px;
        --ry: -100px;
        position: fixed;
        z-index: 150;
        top: var(--cy);
        left: var(--cx);
        font-size: clamp(1.4rem, 5vw, 2.8rem);
        pointer-events: none;
        animation: reaction-fly 1.2s cubic-bezier(0.18, 0.8, 0.25, 1) forwards;
      }

      .curtain {
        position: fixed;
        z-index: 100;
        inset: 0;
        display: grid;
        place-items: center;
        color: var(--paper);
        background: var(--ink);
        pointer-events: none;
        animation: curtain-up 1.05s 0.42s cubic-bezier(0.76, 0, 0.24, 1) forwards;
      }

      .curtain__mark {
        font-size: clamp(3.8rem, 13vw, 9rem);
        font-weight: 950;
        letter-spacing: -0.09em;
        animation: mark-flash 0.8s both;
      }

      @keyframes curtain-up {
        to {
          clip-path: inset(0 0 100% 0);
        }
      }

      @keyframes mark-flash {
        0% { opacity: 0; transform: scale(0.82); filter: blur(12px); }
        50% { opacity: 1; transform: scale(1); filter: blur(0); }
        100% { opacity: 0.2; transform: scale(1.06); }
      }

      @keyframes portrait-enter {
        from { width: min(38vw, 40vh); opacity: 0; }
      }

      @keyframes focus-in {
        from { filter: saturate(0) contrast(1.2) brightness(0.45) blur(14px); }
      }

      @keyframes camera-breathe {
        to { transform: scale(1.09) translateY(-0.7%); }
      }

      @keyframes ambient-drift {
        to { transform: scale(1.19) translate3d(1.2%, -1%, 0); filter: blur(42px) saturate(1.35) brightness(0.47); }
      }

      @keyframes color-pulse {
        to { opacity: 0.72; filter: hue-rotate(8deg); }
      }

      @keyframes grain {
        0% { transform: translate(0, 0); }
        25% { transform: translate(-2%, 1%); }
        50% { transform: translate(1%, -2%); }
        75% { transform: translate(2%, 2%); }
        100% { transform: translate(-1%, -1%); }
      }

      @keyframes title-enter {
        from { opacity: 0; transform: translate(-51%, 80%) skewX(-12deg); filter: blur(9px); }
      }

      @keyframes left-in {
        from { opacity: 0; transform: translate(-90%, -50%) rotate(-90deg); }
      }

      @keyframes right-in {
        from { opacity: 0; transform: translate(90%, -50%) rotate(90deg); }
      }

      @keyframes rise-in {
        from { opacity: 0; transform: translateY(16px); }
      }

      @keyframes token-in {
        from {
          opacity: 0;
          transform: translate(-50%, -50%) rotate(calc(var(--r) - 24deg)) scale(0.2);
          filter: blur(6px);
        }
      }

      @keyframes token-float {
        to {
          transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) rotate(calc(var(--r) + 4deg));
        }
      }

      @keyframes orbit-turn {
        to { transform: translate(-50%, -50%) rotate(348deg); }
      }

      @keyframes ticker-enter-left {
        from { opacity: 0; transform: translateX(-110%) rotate(-3.2deg); }
      }

      @keyframes ticker-enter-right {
        from { opacity: 0; transform: translateX(110%) rotate(2.7deg); }
      }

      @keyframes marquee {
        to { transform: translateX(-50%); }
      }

      @keyframes burst-away {
        0% { opacity: 0; transform: translate(-50%, -50%) scale(0.2) rotate(0); filter: blur(4px); }
        15% { opacity: 1; }
        100% { opacity: 0; transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(1.45) rotate(var(--tr)); filter: blur(0); }
      }

      @keyframes scroll-pulse {
        0%, 100% { opacity: 0.25; transform: scaleY(0.5); transform-origin: top; }
        50% { opacity: 1; transform: scaleY(1); }
      }

      @keyframes dialog-pop {
        from { opacity: 0; transform: scale(0.72) rotate(-7deg); filter: blur(8px); }
      }

      @keyframes emoji-rage {
        from { transform: rotate(-7deg) scale(0.98); }
        to { transform: rotate(7deg) scale(1.04); }
      }

      @keyframes emoji-sick {
        from { transform: translateY(-4px) rotate(-2deg); }
        to { transform: translateY(6px) rotate(2deg); }
      }

      @keyframes reaction-fly {
        0% { opacity: 0; transform: translate(-50%, -50%) scale(0.2) rotate(0); }
        12% { opacity: 1; }
        100% { opacity: 0; transform: translate(calc(-50% + var(--rx)), calc(-50% + var(--ry))) scale(1.3) rotate(var(--rr)); }
      }

      @keyframes card-shake {
        0%, 100% { transform: rotate(-1.2deg) translateX(0); }
        20% { transform: rotate(-3deg) translateX(-9px); }
        40% { transform: rotate(2deg) translateX(8px); }
        60% { transform: rotate(-2deg) translateX(-6px); }
        80% { transform: rotate(1deg) translateX(4px); }
      }

      @keyframes card-squish {
        0% { transform: rotate(-1.2deg) scale(1); }
        45% { transform: rotate(1deg) scale(0.94, 1.06); }
        100% { transform: rotate(-1.2deg) scale(1); }
      }

      @keyframes photo3-ambient-drift {
        from {
          transform: scale(1.15) translate3d(-1.5%, 0.5%, 0);
          filter: blur(43px) saturate(0.72) brightness(0.28);
        }
        to {
          transform: scale(1.23) translate3d(2%, -1.5%, 0);
          filter: blur(50px) saturate(0.92) brightness(0.37);
        }
      }

      @keyframes photo3-wash-breathe {
        from { opacity: 0.74; filter: hue-rotate(-4deg); }
        to { opacity: 1; filter: hue-rotate(7deg); }
      }

      @keyframes photo3-grid-drift {
        to { background-position: var(--p3-grid-size) var(--p3-grid-size), var(--p3-grid-size) var(--p3-grid-size); }
      }

      @keyframes photo3-orb-float {
        from { transform: translate3d(-12%, 5%, 0) scale(0.88); opacity: 0.32; }
        to { transform: translate3d(94%, 38%, 0) scale(1.18); opacity: 0.68; }
      }

      @keyframes photo3-mobile-drift {
        from { transform: scale(1.12) translate3d(-1%, 0, 0); }
        to { transform: scale(1.18) translate3d(1.5%, -1%, 0); }
      }

      @keyframes mobile-portrait-enter {
        from { opacity: 0; transform: scale(1.08); }
        to { opacity: 1; transform: scale(1); }
      }

      @keyframes mobile-camera-breathe {
        from { transform: scale(1.025); }
        to { transform: scale(1.07) translateY(-0.45%); }
      }

      @media (max-width: 720px) {
        body {
          cursor: default;
        }

        .scene,
        .photo2-stage,
        .verdict {
          min-height: 100svh;
          min-height: 100dvh;
        }

        .scene::after {
          position: absolute;
          z-index: -2;
          inset: 0;
          content: "";
          pointer-events: none;
          background:
            linear-gradient(180deg, rgba(10, 6, 8, 0.18), transparent 32%, transparent 59%, rgba(8, 5, 6, 0.72)),
            radial-gradient(circle at 54% 40%, transparent 27%, rgba(8, 5, 6, 0.13) 67%, rgba(8, 5, 6, 0.48));
        }

        .portrait-wrap {
          inset: 0;
          width: 100%;
          height: 100%;
          transform: none;
          filter: none;
          animation-name: mobile-portrait-enter;
        }

        .portrait {
          background-position: 54% center;
          -webkit-mask-image: none;
          mask-image: none;
          filter: saturate(0.91) contrast(1.06) brightness(0.84);
          animation:
            mobile-camera-breathe 14s ease-in-out 1.5s infinite alternate,
            focus-in 1.15s ease-out both;
        }

        .ambient {
          display: none;
        }

        .color-wash {
          opacity: 0.66;
          background:
            radial-gradient(circle at 16% 25%, rgba(255, 53, 93, 0.27), transparent 35%),
            radial-gradient(circle at 84% 74%, rgba(255, 211, 101, 0.14), transparent 35%);
        }

        .vignette {
          background:
            linear-gradient(180deg, rgba(8, 5, 7, 0.42), transparent 20%, transparent 64%, rgba(8, 5, 7, 0.76)),
            radial-gradient(ellipse at center, transparent 44%, rgba(8, 5, 6, 0.35) 118%);
          box-shadow: inset 0 0 18vw rgba(0, 0, 0, 0.3);
        }

        .noise,
        .photo2-grain {
          opacity: 0.075;
          animation: none;
        }

        .chrome {
          inset:
            calc(12px + env(safe-area-inset-top))
            12px
            calc(12px + env(safe-area-inset-bottom));
          border-color: rgba(255, 249, 236, 0.27);
        }

        .chrome::before,
        .chrome::after {
          display: none;
        }

        .axis-name {
          bottom: clamp(98px, 14.5dvh, 132px);
          font-size: clamp(4.8rem, 23vw, 6.4rem);
          letter-spacing: -0.14em;
          -webkit-text-stroke-width: 1px;
          mix-blend-mode: screen;
        }

        .axis-name::after {
          transform: translate(4px, 3px);
        }

        .latin-left,
        .latin-right {
          font-size: clamp(2.1rem, 10.5vw, 3rem);
          opacity: 0.5;
          mix-blend-mode: screen;
        }

        .latin-left { left: -3vw; }
        .latin-right { right: -3vw; }

        .orbit {
          top: 45%;

    <script>
      (() => {
        const root = document.documentElement;
        const scene = document.querySelector(".scene");
        const scatter = document.querySelector("#scatter");
        const pageProgress = document.querySelector("#pageProgress");
        const chapterTwo = document.querySelector(".chapter-two");
        const chapterThree = document.querySelector(".chapter-three");
        const verdict = document.querySelector(".verdict");
        const reactionDialog = document.querySelector("#reactionDialog");
        const reactionMessage = document.querySelector("#reactionMessage");
        const reactionEmoji = document.querySelector("#reactionEmoji");
        const dialogClose = document.querySelector(".dialog-close");
        const labels = ["刘雨菡", "LYH", "爆爆"];
        const tones = ["paper", "red", "butter", "ice"];
        const colors = ["#fff9ec", "#ff355d", "#ffd365", "#cce9df"];
        const positions = [
          [8, 10], [27, 8], [52, 10], [75, 9], [94, 13],
          [13, 27], [33, 31], [70, 29], [88, 26],
          [7, 45], [23, 49], [78, 45], [96, 51],
          [13, 65], [30, 68], [67, 67], [87, 63],
          [6, 82], [24, 87], [48, 84], [73, 86], [93, 81],
          [17, 18], [83, 18], [17, 75], [82, 76],
          [39, 19], [62, 21], [40, 76], [59, 79]
        ];

        let seed = 314159;
        const random = () => {
          seed = (seed * 1664525 + 1013904223) >>> 0;
          return seed / 4294967296;
        };

        positions.forEach(([x, y], index) => {
          const token = document.createElement("span");
          const big = index % 8 === 0;
          const edgeX = window.innerWidth < 720 ? 20 : 12;
          const safeX = Math.min(100 - edgeX, Math.max(edgeX, x));
          const safeY = Math.min(92, Math.max(8, y));
          token.className = "token";
          token.textContent = labels[index % labels.length];
          token.dataset.tone = tones[index % tones.length];
          token.dataset.outline = index % 6 === 0 ? "true" : "false";
          token.dataset.depth = index % 9 === 0 ? "back" : "front";
          token.style.setProperty("--x", `${safeX}%`);
          token.style.setProperty("--y", `${safeY}%`);
          token.style.setProperty("--r", `${(-34 + random() * 68).toFixed(1)}deg`);
          token.style.setProperty("--s", `${(big ? 3.4 + random() * 2.4 : 0.7 + random() * 1.55).toFixed(2)}rem`);
          token.style.setProperty("--o", `${(0.3 + random() * 0.62).toFixed(2)}`);
          token.style.setProperty("--dx", `${(-15 + random() * 30).toFixed(1)}px`);
          token.style.setProperty("--dy", `${(-22 + random() * 38).toFixed(1)}px`);
          token.style.setProperty("--d", `${(7 + random() * 8).toFixed(1)}s`);
          token.style.setProperty("--delay", `${(0.85 + index * 0.035).toFixed(2)}s`);
          scatter.appendChild(token);
        });

        let ticking = false;
        const updatePointer = (event) => {
          if (ticking) return;
          ticking = true;
          requestAnimationFrame(() => {
            const x = event.clientX / window.innerWidth;
            const y = event.clientY / window.innerHeight;
            root.style.setProperty("--mx", ((x - 0.5) * 2).toFixed(3));
            root.style.setProperty("--my", ((y - 0.5) * 2).toFixed(3));
            root.style.setProperty("--px", `${(x * 100).toFixed(2)}%`);
            root.style.setProperty("--py", `${(y * 100).toFixed(2)}%`);
            ticking = false;
          });
        };

        const makeBurst = (event, density = 1) => {
          const baseAmount = window.innerWidth < 720 ? 9 : 14;
          const amount = Math.max(4, Math.round(baseAmount * density));
          for (let i = 0; i < amount; i += 1) {
            const particle = document.createElement("span");
            const angle = (Math.PI * 2 * i) / amount + random() * 0.35;
            const distance = 58 + random() * 110;
            particle.className = "burst";
            particle.textContent = labels[i % labels.length];
            particle.style.setProperty("--bx", `${event.clientX}px`);
            particle.style.setProperty("--by", `${event.clientY}px`);
            particle.style.setProperty("--tx", `${Math.cos(angle) * distance}px`);
            particle.style.setProperty("--ty", `${Math.sin(angle) * distance}px`);
            particle.style.setProperty("--tr", `${-90 + random() * 180}deg`);
            particle.style.setProperty("--burst-color", colors[i % colors.length]);
            particle.style.setProperty("--burst-size", `${0.65 + random() * 1.35}rem`);
            document.body.appendChild(particle);
            particle.addEventListener("animationend", () => particle.remove(), { once: true });
          }
        };

        window.addEventListener("pointermove", updatePointer, { passive: true });
        const bindBurstSurface = (surface) => {
          let touchStart = null;
          surface.addEventListener("pointerdown", (event) => {
            if (event.target.closest("a, button, dialog")) return;
            if (event.pointerType === "mouse") {
              makeBurst(event);
              return;
            }
            makeBurst(event, 0.65);
            touchStart = {
              lastX: event.clientX,
              lastY: event.clientY,
              lastBurst: performance.now()
            };
          }, { passive: true });
          surface.addEventListener("pointermove", (event) => {
            if (!touchStart || event.pointerType === "mouse") return;
            const step = Math.hypot(event.clientX - touchStart.lastX, event.clientY - touchStart.lastY);
            const now = performance.now();
            if (step >= 54 && now - touchStart.lastBurst >= 85) {
              makeBurst(event, 0.48);
              touchStart.lastX = event.clientX;
              touchStart.lastY = event.clientY;
              touchStart.lastBurst = now;
            }
          }, { passive: true });
          surface.addEventListener("pointerup", (event) => {
            if (!touchStart || event.target.closest("a, button, dialog")) {
              touchStart = null;
              return;
            }
            touchStart = null;
          }, { passive: true });
          surface.addEventListener("pointercancel", () => {
            touchStart = null;
          }, { passive: true });
        };

        [scene, chapterTwo, chapterThree, verdict].forEach(bindBurstSurface);
        let scrollTicking = false;
        const updateChapter = () => {
          if (scrollTicking) return;
          scrollTicking = true;
          requestAnimationFrame(() => {
            const rect = chapterTwo.getBoundingClientRect();
            const travel = Math.max(1, rect.height - window.innerHeight);
            const progress = Math.min(1, Math.max(0, -rect.top / travel));
            chapterTwo.style.setProperty("--chapter-progress", progress.toFixed(3));
            chapterTwo.style.setProperty("--ambient-scale", (1.12 + progress * 0.06).toFixed(3));
            chapterTwo.style.setProperty("--card-y", `${((0.5 - progress) * 7).toFixed(2)}vh`);
            chapterTwo.style.setProperty("--card-rotate", `${(-3 + progress * 5).toFixed(2)}deg`);
            chapterTwo.style.setProperty("--card-scale", (0.9 + progress * 0.1).toFixed(3));
            chapterTwo.style.setProperty("--image-scale", (1.08 - progress * 0.05).toFixed(3));
            chapterTwo.style.setProperty("--word-one-x", `${((1 - progress) * 30).toFixed(2)}vw`);
            chapterTwo.style.setProperty("--word-two-x", `${((progress - 1) * 24).toFixed(2)}vw`);
            chapterTwo.style.setProperty("--orbit-rotation", `${(progress * 120).toFixed(2)}deg`);

            const rectThree = chapterThree.getBoundingClientRect();
            const travelThree = Math.max(1, rectThree.height - window.innerHeight);
            const progressThree = Math.min(1, Math.max(0, -rectThree.top / travelThree));
            chapterThree.style.setProperty("--three-progress", progressThree.toFixed(3));
            chapterThree.style.setProperty("--p3-scale", (0.9 + progressThree * 0.1).toFixed(3));
            chapterThree.style.setProperty("--p3-rotate", `${(3 - progressThree * 5).toFixed(2)}deg`);
            chapterThree.style.setProperty("--p3-y", `${((0.5 - progressThree) * 6).toFixed(2)}vh`);
            chapterThree.style.setProperty("--p3-image-scale", (1.06 - progressThree * 0.04).toFixed(3));
            chapterThree.style.setProperty("--p3-left-x", `${(-(1 - progressThree) * 26).toFixed(2)}vw`);
            chapterThree.style.setProperty("--p3-right-x", `${((1 - progressThree) * 24).toFixed(2)}vw`);
            chapterThree.style.setProperty("--p3-halo-rotate", `${(-18 + progressThree * 108).toFixed(2)}deg`);

            const totalScroll = Math.max(1, document.documentElement.scrollHeight - window.innerHeight);
            const overallProgress = Math.min(1, Math.max(0, window.scrollY / totalScroll));
            pageProgress.style.transform = `scaleX(${overallProgress.toFixed(4)})`;
            scrollTicking = false;
          });
        };

        const launchReaction = (button, type) => {
          const isCute = type === "cute";
          reactionDialog.classList.toggle("is-cute", isCute);
          reactionMessage.textContent = isCute ? "好丑" : "我生气了！";
          reactionEmoji.textContent = isCute ? "🤮" : "😡";

          verdict.classList.remove("is-angry", "is-cute");
          void verdict.offsetWidth;
          verdict.classList.add(isCute ? "is-cute" : "is-angry");

          const rect = button.getBoundingClientRect();
          const centerX = rect.left + rect.width / 2;
          const centerY = rect.top + rect.height / 2;
          const particleEmoji = isCute ? "🤢" : "💢";
          for (let i = 0; i < 15; i += 1) {
            const particle = document.createElement("span");
            const angle = (Math.PI * 2 * i) / 15 + random() * 0.3;
            const distance = 80 + random() * 150;
            particle.className = "reaction-particle";
            particle.textContent = particleEmoji;
            particle.style.setProperty("--cx", `${centerX}px`);
            particle.style.setProperty("--cy", `${centerY}px`);
            particle.style.setProperty("--rx", `${Math.cos(angle) * distance}px`);
            particle.style.setProperty("--ry", `${Math.sin(angle) * distance}px`);
            particle.style.setProperty("--rr", `${-120 + random() * 240}deg`);
            document.body.appendChild(particle);
            particle.addEventListener("animationend", () => particle.remove(), { once: true });
          }

          if (typeof reactionDialog.showModal === "function") {
            reactionDialog.showModal();
          } else {
            reactionDialog.setAttribute("open", "");
            reactionDialog.classList.add("fallback-open");
          }
        };

        document.querySelectorAll("[data-reaction]").forEach((button) => {
          button.addEventListener("click", () => launchReaction(button, button.dataset.reaction));
        });

        const closeReactionDialog = () => {
          if (typeof reactionDialog.close === "function") {
            reactionDialog.close();
          } else {
            reactionDialog.removeAttribute("open");
          }
          reactionDialog.classList.remove("fallback-open");
        };

        dialogClose.addEventListener("click", closeReactionDialog);
        reactionDialog.addEventListener("click", (event) => {
          if (event.target === reactionDialog) closeReactionDialog();
        });
        window.addEventListener("keydown", (event) => {
          if (event.key === "Escape" && reactionDialog.classList.contains("fallback-open")) {
            closeReactionDialog();
          }
        });

        window.addEventListener("scroll", updateChapter, { passive: true });
        window.addEventListener("resize", updateChapter, { passive: true });
        updateChapter();
      })();
    </script>
  </body>
</html>
